  <!-- Global Error Handler -->
  <script>
    window.addEventListener('error', function(e) {
      const errDiv = document.createElement('div');
      errDiv.style = 'position:fixed;top:0;left:0;right:0;background:red;color:white;z-index:999999;padding:20px;font-family:monospace;white-space:pre-wrap;overflow:auto;max-height:50vh;';
      errDiv.textContent = 'GLOBAL ERROR: ' + e.message + '\n' + (e.error ? e.error.stack : '');
      document.body.appendChild(errDiv);
    });
    window.addEventListener('unhandledrejection', function(e) {
      const errDiv = document.createElement('div');
      errDiv.style = 'position:fixed;top:50vh;left:0;right:0;background:orange;color:black;z-index:999999;padding:20px;font-family:monospace;white-space:pre-wrap;overflow:auto;max-height:50vh;';
      errDiv.textContent = 'PROMISE REJECTION: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason);
      document.body.appendChild(errDiv);
    });
  </script>
